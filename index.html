<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KCT Bill Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Space+Mono:wght@400;700&family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap" rel="stylesheet">
<style>
:root{--gt-blue:#3C78B4;--gt-blue2:#6996C3;--gt-teal:#00B4C3;--gt-teal2:#78D2E1;--navy:#1e3f6e;--teal-ice:#e4f7f9;--teal-mint:#c8eff3;--blue-ice:#e3eef7;--coral:#e8553d;--coral-l:#fef2f0;--amber:#d97706;--amber-l:#fef3c7;--slate:#475569;--light:#f3f6f8;--card:#fff;--bdr:#dce4ec;--txt:#1e293b;--sub:#64748b;--r:14px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}body{font-family:'DM Sans',system-ui,sans-serif;color:var(--txt);background:var(--light);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--navy);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom));backdrop-filter:blur(16px)}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:rgba(255,255,255,.45);font-size:.6rem;font-weight:600;padding:4px 2px;transition:color .2s;-webkit-tap-highlight-color:transparent}
.bottom-nav a .ico{font-size:1.25rem;line-height:1}.bottom-nav a.active,.bottom-nav a:active{color:#fff}.bottom-nav a.active .ico{filter:drop-shadow(0 0 6px rgba(0,180,195,.5))}
.hero{background:linear-gradient(160deg,var(--navy) 0%,#2a5a90 50%,var(--gt-blue) 100%);padding:2.5rem 1.25rem 2rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 10%,rgba(0,180,195,.15) 0%,transparent 60%),radial-gradient(ellipse at 20% 90%,rgba(120,210,225,.08) 0%,transparent 50%)}
.hero *{position:relative;z-index:1}.hero .ey{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--gt-teal2);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.6rem}
.hero h1{font-family:'Fraunces',serif;font-size:1.85rem;color:#fff;font-weight:800;line-height:1.12;letter-spacing:-.02em}.hero h1 span{color:var(--gt-teal)}
.hero .sub{color:rgba(255,255,255,.55);font-size:.88rem;margin-top:.7rem;line-height:1.5}
.hero-chips{display:flex;gap:.5rem;margin-top:1.4rem;flex-wrap:wrap}.chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:.55rem .85rem}
.chip .l{font-size:.55rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.07em}.chip .v{font-family:'Fraunces',serif;font-size:1.15rem;color:#fff;font-weight:600;margin-top:1px}
.sec{padding:1.5rem 1rem 1rem;padding-bottom:0}.sec:last-of-type{padding-bottom:calc(80px + env(safe-area-inset-bottom) + 1rem)}
.sec-label{font-family:'Space Mono',monospace;font-size:.58rem;color:var(--gt-teal);text-transform:uppercase;letter-spacing:.12em}
.sec h2{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:800;color:var(--navy);line-height:1.15;margin-top:.15rem}.sec h2 span{color:var(--gt-teal)}.sec .intro{color:var(--sub);font-size:.88rem;margin-top:.4rem}
.accordion{margin-top:1rem}.acc-item{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:.6rem;overflow:hidden;transition:box-shadow .2s}.acc-item.open{box-shadow:0 2px 12px rgba(0,0,0,.07)}
.acc-hdr{display:flex;align-items:center;gap:.7rem;padding:.9rem 1rem;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.acc-hdr .ico{font-size:1.15rem;flex-shrink:0}.acc-hdr .label{flex:1}.acc-hdr .label .abbr{font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;color:var(--gt-blue)}
.acc-hdr .label .abbr.teal{color:var(--gt-teal)}.acc-hdr .label .name{font-weight:700;font-size:.92rem;color:var(--navy);margin-top:1px}
.acc-hdr .arrow{font-size:.7rem;color:var(--sub);transition:transform .25s;flex-shrink:0}.acc-item.open .acc-hdr .arrow{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease}.acc-body-inner{padding:0 1rem 1rem;font-size:.86rem;color:var(--slate);line-height:1.6}.acc-body-inner strong{color:var(--navy)}
.journey-steps{margin-top:1.2rem;position:relative;padding-left:2.2rem}
.journey-steps::before{content:'';position:absolute;left:1rem;top:.5rem;bottom:.5rem;width:3px;background:linear-gradient(var(--gt-blue),var(--gt-blue2),var(--gt-teal),var(--gt-teal2),var(--coral));border-radius:3px}
.j-step{position:relative;padding-bottom:1.4rem}.j-step:last-child{padding-bottom:0}
.j-step .dot{position:absolute;left:-2.2rem;top:0;width:2rem;height:2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.j-step .j-title{font-weight:700;font-size:.9rem;color:var(--navy)}.j-step .j-charge{display:inline-block;margin-top:.25rem;padding:3px 10px;border-radius:6px;font-size:.7rem;font-weight:700}.j-step .j-desc{font-size:.8rem;color:var(--sub);margin-top:.2rem}
.j-step:nth-child(1) .dot{background:var(--navy);color:#fff}.j-step:nth-child(2) .dot{background:var(--gt-blue);color:#fff}.j-step:nth-child(3) .dot{background:var(--gt-teal);color:#fff}.j-step:nth-child(4) .dot{background:var(--gt-teal2);color:var(--navy)}.j-step:nth-child(5) .dot{background:var(--coral);color:#fff}
.j-step:nth-child(1) .j-charge{background:#e1eaf3;color:var(--navy)}.j-step:nth-child(2) .j-charge{background:var(--blue-ice);color:var(--gt-blue)}.j-step:nth-child(3) .j-charge{background:var(--teal-ice);color:#008a96}.j-step:nth-child(4) .j-charge{background:var(--teal-mint);color:#006670}.j-step:nth-child(5) .j-charge{background:var(--coral-l);color:var(--coral)}
.inv-stack{display:flex;flex-direction:column;gap:.8rem;margin-top:1.2rem}.inv-c{border-radius:var(--r);padding:1.1rem 1rem}
.inv-c.first{background:linear-gradient(135deg,#e4f7f9,#c8eff3);border:1px solid #9ae3ea}.inv-c.second{background:linear-gradient(135deg,#e3eef7,#cddced);border:1px solid #a8c4df}
.inv-c .inv-n{font-family:'Space Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em}.inv-c.first .inv-n{color:#008a96}.inv-c.second .inv-n{color:var(--gt-blue)}
.inv-c h4{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-top:2px}.inv-c ul{margin-top:.5rem;padding-left:1.1rem}.inv-c li{font-size:.82rem;color:var(--slate);margin-bottom:.2rem}
.inv-c .trg{margin-top:.7rem;font-size:.75rem;font-weight:600;padding:5px 12px;border-radius:8px;display:inline-block}.inv-c.first .trg{background:rgba(0,180,195,.1);color:#008a96}.inv-c.second .trg{background:rgba(60,120,180,.1);color:var(--gt-blue)}
.tier-stack{display:flex;flex-direction:column;gap:.8rem;margin-top:1.2rem}.tier-c{border-radius:var(--r);overflow:hidden;background:var(--card);border:1px solid var(--bdr)}
.tier-c .t-hdr{padding:.9rem 1rem;color:#fff}.tier-c:nth-child(1) .t-hdr{background:linear-gradient(135deg,var(--navy),#2a5a90)}.tier-c:nth-child(2) .t-hdr{background:linear-gradient(135deg,var(--gt-blue),var(--gt-blue2))}.tier-c:nth-child(3) .t-hdr{background:linear-gradient(135deg,var(--gt-teal),var(--gt-teal2))}
.tier-c .t-hdr h3{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700}.tier-c .t-hdr .lines{font-size:.76rem;opacity:.85;margin-top:2px}
.tier-c .t-body{padding:.8rem 1rem}.tier-c .feat{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem;font-size:.82rem;color:var(--slate)}.tier-c .feat .ficon{flex-shrink:0;font-size:.72rem;margin-top:3px}
.prod-pills{display:flex;gap:.4rem;margin-top:1rem;overflow-x:auto;padding-bottom:.4rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}.prod-pills::-webkit-scrollbar{display:none}
.ppill{flex-shrink:0;padding:.55rem .9rem;border-radius:10px;font-size:.78rem;font-weight:600;cursor:pointer;border:2px solid var(--bdr);background:var(--card);color:var(--slate);-webkit-tap-highlight-color:transparent;transition:all .15s;white-space:nowrap}
.ppill.active{background:var(--gt-blue);color:#fff;border-color:var(--gt-blue)}
.prod-panel{margin-top:1rem;animation:slideUp .3s ease}@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.route-vis{display:flex;align-items:center;gap:.35rem;padding:.8rem .9rem;background:linear-gradient(135deg,var(--teal-ice),var(--teal-mint));border-radius:var(--r);margin-bottom:1rem;flex-wrap:wrap;border:1px solid #9ae3ea;font-size:.78rem}
.rn{padding:.35rem .65rem;border-radius:8px;font-weight:700;font-size:.75rem}.rn.o{background:var(--navy);color:#fff}.rn.d{background:var(--gt-blue);color:#fff}
.rn.t{background:rgba(0,180,195,.12);color:#008a96;font-weight:600;font-size:.7rem;border:1px solid rgba(0,180,195,.3)}.ra{color:var(--gt-teal);font-weight:700}
.p-explain{font-size:.86rem;color:var(--slate);margin-bottom:1rem;line-height:1.6}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.06);margin-top:.8rem;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.78rem;white-space:nowrap}
thead th{background:var(--gt-blue);color:#fff;padding:.6rem .7rem;text-align:left;font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}
tbody td{padding:.55rem .7rem;border-bottom:1px solid var(--bdr)}tbody tr:nth-child(even){background:#f4f7fa}
td.n{text-align:center;font-family:'Space Mono',monospace;font-size:.74rem}td.b{font-weight:700;color:var(--navy)}
tr.tot td{background:var(--teal-ice)!important;font-weight:700;color:var(--navy);border-top:2px solid var(--gt-teal)}tr.hi{background:var(--blue-ice)!important}
.co{border-radius:10px;padding:.85rem 1rem;margin-top:.8rem;font-size:.82rem;display:flex;align-items:flex-start;gap:.6rem}
.co.info{background:var(--teal-ice);border-left:3px solid var(--gt-teal)}.co.warn{background:var(--amber-l);border-left:3px solid var(--amber)}.co.danger{background:var(--coral-l);border-left:3px solid var(--coral)}.co .ci{font-size:1rem;flex-shrink:0;margin-top:1px}
footer{background:var(--navy);color:rgba(255,255,255,.45);padding:2rem 1.25rem calc(80px + env(safe-area-inset-bottom) + 1rem);text-align:center;font-size:.78rem;line-height:1.6}footer strong{color:#fff}
.divider{height:4px;background:linear-gradient(90deg,var(--gt-blue),var(--gt-teal),var(--gt-teal2));margin:0;border:none;opacity:.35}
.mt1{margin-top:.8rem}.mt15{margin-top:1.2rem}h3.sub-hdr{font-size:.95rem;font-family:'Fraunces',serif;font-weight:700;color:var(--navy);margin-top:1.8rem;margin-bottom:.2rem}
</style>
</head>
<body>
<section class="hero">
  <div class="ey">KCT · GT</div>
  <h1>The Complete Guide to <span>KCT Bill</span></h1>
  <p class="sub">Tariffs, products & Bill explained — for every department and new team members.</p>
  <div class="hero-chips">
    <div class="chip"><div class="l">Products</div><div class="v">5</div></div>
    <div class="chip"><div class="l">Tiers</div><div class="v">3</div></div>
    <div class="chip"><div class="l">Effective</div><div class="v">15 Mar</div></div>
    <div class="chip"><div class="l">Valid Until</div><div class="v">31 Mar</div></div>
  </div>
</section>

<hr class="divider">

<footer><strong>KCT Bill Guide</strong><br>KCT · GT<br>v3.0 · March 2026 · Confidential</footer>

<nav class="bottom-nav">
  <a href="#glossary"><span class="ico">📖</span>Terms</a>
  <a href="#journey"><span class="ico">🚢</span>Journey</a>
  <a href="#tiers"><span class="ico">👥</span>Tiers</a>
  <a href="#products"><span class="ico">📦</span>Products</a>
  <a href="#rates"><span class="ico">💰</span>Rates</a>
  
</nav>

<script>
document.querySelectorAll('.acc-hdr').forEach(h=>{h.addEventListener('click',()=>{const i=h.parentElement,b=h.nextElementSibling,w=i.classList.contains('open');i.parentElement.querySelectorAll('.acc-item').forEach(a=>{a.classList.remove('open');a.querySelector('.acc-body').style.maxHeight=null});if(!w){i.classList.add('open');b.style.maxHeight=b.scrollHeight+'px'}})});
document.querySelectorAll('.ppill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.ppill').forEach(x=>x.classList.remove('active'));p.classList.add('active');document.querySelectorAll('.prod-panel').forEach(x=>x.style.display='none');const el=document.getElementById('p'+p.dataset.p);el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='slideUp .3s ease'})});
const secs=document.querySelectorAll('section[id]'),navAs=document.querySelectorAll('.bottom-nav a');
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){navAs.forEach(a=>a.classList.remove('active'));const m=[...navAs].find(a=>a.getAttribute('href')==='#'+e.target.id);if(m)m.classList.add('active')}})},{threshold:0.15,rootMargin:'-60px 0px -40% 0px'});
secs.forEach(s=>obs.observe(s));
</script>
</body>
</html>
